<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Energy System">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Energy System — Éditeur de personnages</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0f13;
  --bg2: #14151b;
  --bg3: #1c1e27;
  --bg4: #23262f;
  --border: #2e3140;
  --border2: #3d4155;
  --text: #e8eaf0;
  --text2: #9196a8;
  --text3: #5c6070;
  --accent: #e8c46a;
  --accent2: #c9a84c;
  --offc: #e05c5c;
  --def: #5c9be0;
  --util: #a885ee;
  --font-main: 'Barlow', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
}

/* ── Layout Principal ── */
.app-container {
  display: grid;
  grid-template-columns: 260px 1fr 400px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

@media (max-width: 1100px) {
  .app-container { grid-template-columns: 240px 1fr; }
  .preview-section { display: none; } /* On cache la preview sur petits écrans */
}

/* Header */
header {
  grid-column: 1 / -1;
  padding: calc(0.8rem + var(--safe-top)) 1.5rem 0.8rem 1.5rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-group h1 {
  font-family: var(--font-cond);
  font-weight: 700;
  font-size: 1.3rem;
  text-transform: uppercase;
  color: var(--accent);
}

/* Sidebar (Liste des personnages) */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-header {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
}

.char-list-item {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}

.char-list-item:hover { background: var(--bg3); }
.char-list-item.active { background: var(--bg4); border-left: 3px solid var(--accent); }

/* Editeur (Centre) */
.editor-main {
  padding: 1.5rem;
  overflow-y: auto;
  background: var(--bg);
}

/* Preview (Droite) */
.preview-section {
  background: var(--bg2);
  border-left: 1px solid var(--border);
  padding: 1.5rem;
  overflow-y: auto;
}

/* Styles des Cards & Champs (Inchangés) */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.75rem; color: var(--text3); text-transform: uppercase; margin-bottom: 0.3rem; }
input, select, textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 0.6rem; border-radius: 4px; }

.btn-primary { background: var(--accent); color: var(--bg); border: none; padding: 0.6rem 1rem; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; }

/* Footer */
.footer-bar {
  grid-column: 1 / -1;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 0.5rem 1.5rem;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-cond);
  font-size: 0.9rem;
}

</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-group">
      <h1>Energy System</h1>
    </div>
    <div class="toolbar">
        </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="btn-primary" onclick="newCharacter()">+ Nouveau Héro</button>
    </div>
    <div id="char-list">
      </div>
  </aside>

  <main class="editor-main">
    <section class="card">
      <div class="field">
        <label>Nom du Personnage</label>
        <input type="text" id="char-name" oninput="update('name', this.value)">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="field">
          <label>Rang</label>
          <select id="char-rank" onchange="update('rank', parseInt(this.value))">
            <option value="1">1 (Local)</option>
            <option value="2">2 (Urbain)</option>
            <option value="3">3 (National)</option>
            <option value="4">4 (Mondial)</option>
            <option value="5">5 (Cosmique)</option>
          </select>
        </div>
        <div class="field">
          <label>Initiative</label>
          <input type="number" id="char-init" oninput="update('init', parseInt(this.value)||0)">
        </div>
      </div>
    </section>

    <section class="card">
      <label style="font-size: 0.75rem; color: var(--text3); text-transform: uppercase;">Attributs</label>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 0.5rem;">
        <input type="number" id="char-off" placeholder="OFF" oninput="update('off', parseInt(this.value)||0)">
        <input type="number" id="char-def" placeholder="DEF" oninput="update('def', parseInt(this.value)||0)">
        <input type="number" id="char-util" placeholder="UTIL" oninput="update('util', parseInt(this.value)||0)">
      </div>
    </section>

    <section class="card">
      <label style="font-size: 0.75rem; color: var(--text3); text-transform: uppercase;">Pouvoirs</label>
      <div id="powers-container" style="margin-top:0.5rem"></div>
      <button onclick="addPower()" style="background:none; border:1px dashed var(--border2); color:var(--accent); width:100%; padding:0.5rem; cursor:pointer; margin-top:0.5rem">+ Ajouter</button>
    </section>
  </main>

  <section class="preview-section">
    <div id="live-preview">
        </div>
  </section>

  <footer class="footer-bar">
    <div>Points : <span id="pts-used">0</span> / <span id="pts-max">20</span></div>
    <div>Énergie : <span id="energy-val">11</span></div>
  </footer>
</div>

<script>
/* ── State ── */
let characters = JSON.parse(localStorage.getItem('es_chars') || '[]');
let currentId = localStorage.getItem('es_current_id') || null;

// Initialisation
if (characters.length === 0) {
    newCharacter();
} else {
    renderSidebar();
    loadCharacter(currentId || characters[0].id);
}

function newCharacter() {
    const newChar = {
        id: Date.now().toString(),
        name: "Nouveau Héro",
        rank: 1,
        init: 0,
        off: 0,
        def: 0,
        util: 0,
        powers: [],
        notes: ""
    };
    characters.push(newChar);
    saveAll();
    loadCharacter(newChar.id);
    renderSidebar();
}

function loadCharacter(id) {
    currentId = id;
    localStorage.setItem('es_current_id', id);
    const char = characters.find(c => c.id === id);
    
    document.getElementById('char-name').value = char.name;
    document.getElementById('char-rank').value = char.rank;
    document.getElementById('char-init').value = char.init;
    document.getElementById('char-off').value = char.off;
    document.getElementById('char-def').value = char.def;
    document.getElementById('char-util').value = char.util;
    
    renderPowers();
    renderSidebar();
    calc();
}

function update(key, val) {
    const char = characters.find(c => c.id === currentId);
    char[key] = val;
    saveAll();
    calc();
    if(key === 'name') renderSidebar();
}

function saveAll() {
    localStorage.setItem('es_chars', JSON.stringify(characters));
}

function renderSidebar() {
    const container = document.getElementById('char-list');
    container.innerHTML = characters.map(c => `
        <div class="char-list-item ${c.id === currentId ? 'active' : ''}" onclick="loadCharacter('${c.id}')">
            <div style="font-weight:600">${c.name || 'Sans nom'}</div>
            <div style="font-size:0.75rem; color:var(--text3)">Rang ${c.rank}</div>
        </div>
    `).join('');
}

function renderPowers() {
    const char = characters.find(c => c.id === currentId);
    const container = document.getElementById('powers-container');
    container.innerHTML = char.powers.map((p, i) => `
        <div style="display:flex; gap:0.5rem; margin-bottom:0.4rem">
            <input type="text" value="${p.name}" oninput="updatePower(${i}, 'name', this.value)" placeholder="Pouvoir">
            <input type="number" value="${p.cost}" oninput="updatePower(${i}, 'cost', parseInt(this.value)||0)" style="width:60px">
            <button onclick="removePower(${i})" style="background:none; border:none; color:var(--offc); cursor:pointer">✕</button>
        </div>
    `).join('');
}

function addPower() {
    const char = characters.find(c => c.id === currentId);
    char.powers.push({ name: "", cost: 0 });
    renderPowers();
    saveAll();
}

function updatePower(i, key, val) {
    const char = characters.find(c => c.id === currentId);
    char.powers[i][key] = val;
    saveAll();
    calc();
}

function removePower(i) {
    const char = characters.find(c => c.id === currentId);
    char.powers.splice(i, 1);
    renderPowers();
    saveAll();
    calc();
}

function calc() {
    const char = characters.find(c => c.id === currentId);
    const max = 20 + (char.rank - 1) * 10;
    const energy = 10 + char.rank;
    let used = char.off + char.def + char.util;
    char.powers.forEach(p => used += p.cost);

    document.getElementById('pts-used').textContent = used;
    document.getElementById('pts-max').textContent = max;
    document.getElementById('energy-val').textContent = energy;
    
    // Mise à jour de la preview simplifiée
    document.getElementById('live-preview').innerHTML = `
        <h2 style="color:var(--accent); text-transform:uppercase">${char.name}</h2>
        <p>Rang ${char.rank} — Initiative ${char.init}</p>
        <hr style="border:0; border-top:1px solid var(--border); margin:1rem 0">
        <div style="display:flex; justify-content:space-between">
            <span>OFF: ${char.off}</span>
            <span>DEF: ${char.def}</span>
            <span>UTIL: ${char.util}</span>
        </div>
    `;
}
</script>

</body>
</html>
