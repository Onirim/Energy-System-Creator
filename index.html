<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Energy System">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Energy System — Éditeur de personnages</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0f13;
  --bg2: #14151b;
  --bg3: #1c1e27;
  --bg4: #23262f;
  --border: #2e3140;
  --border2: #3d4155;
  --text: #e8eaf0;
  --text2: #9196a8;
  --text3: #5c6070;
  --accent: #e8c46a;
  --accent2: #c9a84c;
  --offc: #e05c5c;
  --offd: #e07a3a;
  --def: #5c9be0;
  --util: #a885ee;
  --font-main: 'Barlow', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Layout ── */
.app-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
}

header {
  padding: calc(1rem + var(--safe-top)) 1rem 1rem 1rem;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.logo-group h1 {
  font-family: var(--font-cond);
  font-weight: 700;
  font-size: 1.5rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}

.logo-group p {
  font-size: 0.75rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.toolbar-right {
  display: flex;
  gap: 0.5rem;
}

button.btn-icon {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 0.5rem;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

button.btn-icon:hover {
  background: var(--bg4);
  border-color: var(--accent);
}

/* ── Main Content ── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 1rem;
  padding-bottom: 5rem;
}

.editor-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.5rem;
}

@media (min-width: 900px) {
  .editor-grid { grid-template-columns: 1fr 1fr; }
}

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
}

.card-title {
  font-family: var(--font-cond);
  font-weight: 600;
  font-size: 1.1rem;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

/* Form Styles */
.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-size: 0.8rem;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 0.25rem;
}
input[type="text"], 
input[type="number"], 
select, 
textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 0.6rem;
  border-radius: 4px;
  font-family: var(--font-main);
  font-size: 1rem;
}

/* Stats Grid */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.stat-box {
  background: var(--bg3);
  padding: 0.75rem;
  border-radius: 6px;
  text-align: center;
  border: 1px solid transparent;
}
.stat-box.off { border-color: rgba(224, 92, 92, 0.3); }
.stat-box.def { border-color: rgba(92, 155, 224, 0.3); }
.stat-box.utl { border-color: rgba(168, 133, 238, 0.3); }

.stat-label {
  display: block;
  font-size: 0.7rem;
  text-transform: uppercase;
  color: var(--text3);
}
.stat-val {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.4rem;
  display: block;
}

/* Dynamic Lists */
.list-item {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  align-items: flex-start;
}
.btn-del {
  background: #3a1c1c;
  color: #ff8080;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-add {
  width: 100%;
  background: var(--bg4);
  color: var(--accent);
  border: 1px dashed var(--accent2);
  padding: 0.5rem;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
}

/* Footer Counter */
.counter-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 2px solid var(--accent);
  padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px));
  display: flex;
  justify-content: space-around;
  font-family: var(--font-cond);
  font-weight: 600;
  z-index: 100;
}
.counter-item { text-align: center; }
.counter-lbl { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; display: block; }
.counter-val { font-size: 1.2rem; }
.counter-val.over { color: var(--offc); }

</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-group">
      <h1>Energy System</h1>
      <p>Character Editor</p>
    </div>
    <div class="toolbar-right">
      </div>
  </header>

  <main>
    <div class="editor-grid">
      
      <section class="card">
        <div class="card-title">Identité</div>
        <div class="field">
          <label>Nom du Héro / Héroïne</label>
          <input type="text" id="char-name" placeholder="Ex: Aegis, Volt..." oninput="update('name', this.value)">
        </div>
        <div class="stats-row">
          <div class="field">
            <label>Rang</label>
            <select id="char-rank" onchange="update('rank', parseInt(this.value))">
              <option value="1">1 (Local)</option>
              <option value="2">2 (Urbain)</option>
              <option value="3">3 (National)</option>
              <option value="4">4 (Mondial)</option>
              <option value="5">5 (Cosmique)</option>
            </select>
          </div>
          <div class="field">
            <label>Initiative</label>
            <input type="number" id="char-init" value="0" oninput="update('init', parseInt(this.value)||0)">
          </div>
          <div class="field">
            <label>Énergie</label>
            <div id="display-energy" class="stat-val" style="margin-top:0.4rem; color:var(--accent)">10</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Attributs</div>
        <div class="stats-row">
          <div class="stat-box off">
            <span class="stat-label">Offensif</span>
            <input type="number" class="stat-val" style="background:transparent; border:none; width:100%; text-align:center" id="char-off" value="0" oninput="update('off', parseInt(this.value)||0)">
          </div>
          <div class="stat-box def">
            <span class="stat-label">Défensif</span>
            <input type="number" class="stat-val" style="background:transparent; border:none; width:100%; text-align:center" id="char-def" value="0" oninput="update('def', parseInt(this.value)||0)">
          </div>
          <div class="stat-box utl">
            <span class="stat-label">Utilitaire</span>
            <input type="number" class="stat-val" style="background:transparent; border:none; width:100%; text-align:center" id="char-util" value="0" oninput="update('util', parseInt(this.value)||0)">
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Pouvoirs & Aptitudes</div>
        <div id="powers-list"></div>
        <button class="btn-add" onclick="addItem('powers')">+ Ajouter un pouvoir</button>
      </section>

      <section class="card">
        <div class="card-title">Notes & Équipement</div>
        <textarea id="char-notes" style="min-height: 150px; resize: vertical;" placeholder="Détails, gadgets, points faibles..." oninput="update('notes', this.value)"></textarea>
      </section>

    </div>
  </main>

  <footer class="counter-bar">
    <div class="counter-item">
      <span class="counter-lbl">Pts Utilisés</span>
      <span id="pts-used" class="counter-val">0</span>
    </div>
    <div class="counter-item">
      <span class="counter-lbl">Pts Max</span>
      <span id="pts-max" class="counter-val">20</span>
    </div>
  </footer>
</div>

<script>
/* ── State Management ── */
let s = {
  name: "",
  rank: 1,
  init: 0,
  off: 0,
  def: 0,
  util: 0,
  powers: [],
  notes: ""
};

// Initial Load
window.onload = () => {
  const saved = localStorage.getItem('es_hero');
  if (saved) {
    s = JSON.parse(saved);
    renderAll();
  }
};

function save() {
  localStorage.setItem('es_hero', JSON.stringify(s));
  calc();
}

function update(key, val) {
  s[key] = val;
  save();
}

function calc() {
  // Pts Max = 20 + (Rang-1)*10
  const max = 20 + (s.rank - 1) * 10;
  // Energie = 10 + Rang
  const energy = 10 + s.rank;
  
  // Cost = Off + Def + Util + Sum(Powers)
  let used = s.off + s.def + s.util;
  s.powers.forEach(p => used += (parseInt(p.cost) || 0));

  document.getElementById('pts-used').textContent = used;
  document.getElementById('pts-used').className = used > max ? 'counter-val over' : 'counter-val';
  document.getElementById('pts-max').textContent = max;
  document.getElementById('display-energy').textContent = energy;
}

/* ── UI Rendering ── */
function renderAll() {
  document.getElementById('char-name').value = s.name;
  document.getElementById('char-rank').value = s.rank;
  document.getElementById('char-init').value = s.init;
  document.getElementById('char-off').value = s.off;
  document.getElementById('char-def').value = s.def;
  document.getElementById('char-util').value = s.util;
  document.getElementById('char-notes').value = s.notes;
  renderPowers();
  calc();
}

function renderPowers() {
  const container = document.getElementById('powers-list');
  container.innerHTML = "";
  s.powers.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = "list-item";
    div.innerHTML = `
      <input type="text" placeholder="Nom" value="${p.name}" oninput="updateItem('powers', ${idx}, 'name', this.value)">
      <input type="number" placeholder="Coût" style="width:70px" value="${p.cost}" oninput="updateItem('powers', ${idx}, 'cost', parseInt(this.value)||0)">
      <button class="btn-del" onclick="removeItem('powers', ${idx})">✕</button>
    `;
    container.appendChild(div);
  });
}

function addItem(key) {
  s[key].push({ name: "", cost: 0 });
  renderPowers();
  save();
}

function updateItem(key, idx, field, val) {
  s[key][idx][field] = val;
  save();
}

function removeItem(key, idx) {
  s[key].splice(idx, 1);
  renderPowers();
  save();
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</body>
</html>
